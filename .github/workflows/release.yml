name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: yarn install --immutable

      - name: Set version
        run: echo "export const version = '${{ github.ref_name }}';" > src/var/version.ts

      - run: yarn build

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/simple-weather-card.js
